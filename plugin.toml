id = "cod3ddot/cardwire-noctalia"
name = "cardwire-noctalia"
version = "0.0.0"
min_noctalia = "5.0.0"
author = "cod3ddot"
license = "MIT"
deprecated = false
icon = "device-laptop"
description = "Brings GPU control to your noctalia shell."
tags = ["gpu", "system", "cardwire"]

# background service
# polls cardwire state and publishes it to shared state
[[service]]
id = "service"
entry = "service.luau"

# bar widget
# glyph + label, colour-coded per mode, click to cycle.
[[widget]]
id = "gpu-mode"
name = "GPU Mode"
entry = "widget.luau"

# control-center shortcut
# single-tap toggle between integrated and hybrid.
[[shortcut]]
id = "toggle"
name = "GPU Mode"
entry = "shortcut.luau"
